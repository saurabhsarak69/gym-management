<!DOCTYPE html>
<html>
<head>
  <title>Add Member</title>
</head>

<body>

<h1 style="text-align:center;">➕ Add Member</h1>

<form action="/register" method="POST" style="width:300px;margin:auto;">

  <input type="text" name="full_name" placeholder="Full Name" required><br><br>

  <input type="number" name="age" placeholder="Age" required><br><br>

  <input type="text" name="gender" placeholder="Gender" required><br><br>

  <input type="number" name="weight" placeholder="Weight"><br><br>

  <input type="number" name="height" placeholder="Height"><br><br>

  <input type="text" name="mobile" placeholder="Mobile" required><br><br>

  <input type="email" name="email" placeholder="Email" required><br><br>

  <input type="password" name="password" placeholder="Password" required><br><br>

  <button type="submit">Add Member</button>

</form>

</body>
</html>
